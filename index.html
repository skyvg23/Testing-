<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Little Notebook ♡</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Lora&family=Dancing+Script&display=swap" rel="stylesheet">

<style>
/* ========= ROOT ========= */
:root{
  --blush:#f9d0d8;
  --rose:#e8a0b0;
  --crimson:#c45474;
  --deep:#8b2a42;
  --paper:#fdf5f0;
}

/* ========= BASE ========= */
body{
  margin:0;
  font-family:'Lora',serif;
  background:var(--deep);
  color:#3a1a22;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* ========= HEADER ========= */
.site-header{
  text-align:center;
  margin:20px 0;
}
.site-title{
  font-family:'Dancing Script',cursive;
  font-size:2.5rem;
  color:var(--blush);
}

/* ========= NOTEBOOK ========= */
.notebook{
  display:flex;
  width:90%;
  max-width:900px;
  height:500px;
  background:var(--paper);
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.spine{
  width:30px;
  background:var(--crimson);
}

.page{
  flex:1;
  padding:20px;
}

/* ========= BUTTON ========= */
.btn{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:linear-gradient(135deg,var(--crimson),var(--deep));
  color:#fff;
  cursor:pointer;
}

/* ========= OVERLAY ========= */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  background:#fff;
  padding:30px;
  border-radius:16px;
  text-align:center;
}

/* ========= TEXTAREA ========= */
textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<header class="site-header">
  <div class="site-title">My Little Notebook ♡</div>
</header>

<!-- ===== NOTEBOOK ===== -->
<div class="notebook">
  <div class="spine"></div>
  <div class="page">
    <h2>Welcome ♡</h2>
    <p>This is your notebook.</p>
    <button class="btn" onclick="openQuestions()">Start</button>
  </div>
</div>

<!-- ===== QUESTIONS ===== -->
<div class="overlay" id="questions" style="display:none;">
  <div class="card">
    <h3>Question</h3>
    <p>What do you like about Sky?</p>
    <textarea id="answer"></textarea><br><br>
    <button class="btn" onclick="saveAnswer()">Submit</button>
  </div>
</div>

<script>

/* ========= OPEN QUESTIONS ========= */
function openQuestions(){
  document.getElementById("questions").style.display="flex";
}

/* ========= SAVE ========= */
function saveAnswer(){
  const ans = document.getElementById("answer").value;
  localStorage.setItem("answer", ans);
  alert("Saved ♡");
}

/* ========= LOAD ========= */
window.onload = () => {
  const saved = localStorage.getItem("answer");
  if(saved){
    console.log("Saved answer:", saved);
  }
}

</script>

</body>
</html>
